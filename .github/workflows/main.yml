name: Fast APK Build
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Generate Wrapper Files
      run: |
        cd weather-wallpaper-updated/app_modified
        gradle wrapper
        
    - name: Build APK
      run: |
        cd weather-wallpaper-updated/app_modified
        chmod +x gradlew
        ./gradlew assembleDebug
        
    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: weather-wallpaper-updated/app_modified/app/build/outputs/apk/debug/*.apk
